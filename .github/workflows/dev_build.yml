name: Build Dev Version

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short git hash
        id: git
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # 构建项目
      - name: Build project
        run: |
          bash ./.utils/build_linux.sh github_CI_dev

      # 上传 CI 产物
      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StreackServicesDatapack-git@${{ steps.git.outputs.sha }}
          path: target/*
